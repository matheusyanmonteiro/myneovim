<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">VICARIOUS.NVIM dashboard preview</title>
  <desc id="description">A cyberpunk terminal dashboard customized for Matheus Yan Monteiro.</desc>
  <defs>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111320"/>
      <stop offset="1" stop-color="#090A12"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: "JetBrainsMono Nerd Font", "DejaVu Sans Mono", monospace; }
      .muted { fill: #72758F; }
      .circuit { fill: #343758; }
      .cyan { fill: #45E6E6; }
      .purple { fill: #A970FF; }
      .orange { fill: #FF9D57; }
      .green { fill: #61FF84; }
      .red { fill: #FF5C72; }
      .text { fill: #D8D9E8; }
